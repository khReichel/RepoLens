name: repolens
services:
  # The Gateway (Nginx) routes traffic: /api/ -> Backend, everything else -> UI
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ui
    networks:
      - repolens-network

  # --- RepoLens Backend ---
  backend:
    image: ghcr.io/khreichel/repolens-backend:latest
    container_name: repolens-backend
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./exports:/app/export
    environment:
      - REPOLENS_CONFIG=/app/config/config.yaml
    networks:
      - repolens-network

  # --- RepoLens UI ---
  ui:
    image: ghcr.io/khreichel/repolens-ui:latest
    container_name: repolens-ui
    restart: unless-stopped
    networks:
      - repolens-network

  # --- RepoLens Importer (Run on demand: docker compose run importer) ---
  importer:
    image: ghcr.io/khreichel/repolens-backend:latest
    container_name: repolens-importer
    user: "${HOST_UID}:${HOST_GID}"

    profiles:
      - tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./exports:/app/export
      - ./repo:/repo:ro
    environment:
      - HOME=/tmp
      - REPOLENS_CONFIG=/app/config/config.yaml
    entrypoint: ["python", "/app/src/importer.py"]
    networks:
      - repolens-network

networks:
  repolens-network:
    driver: bridge
