services:
  # --- Gateway (Nginx) ---
  gateway:
    image: nginx:alpine
    container_name: pulseflow-gateway
    ports:
      - "80:80"  # Die einzige Tür nach draußen
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ui
    networks:
      - pulseflow-network

  # --- PulseFlow Backend ---
  backend:
    image: ghcr.io/khReichel/pulseflow-backend:latest
    container_name: pulseflow-backend
    restart: unless-stopped
    environment:
      - PULSEFLOW_PORT=8000
      - CONFIG_PATH=/app/config/config.yaml
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./exports:/app/export
    networks:
      - pulseflow-network

  # --- PulseFlow UI ---
  ui:
    image: ghcr.io/khReichel/pulseflow-ui:latest
    container_name: pulseflow-ui
    restart: unless-stopped
    # Kein "ports" Mapping nötig, da Nginx intern auf Port 80 zugreift
    networks:
      - pulseflow-network

networks:
  pulseflow-network:
    driver: bridge

    