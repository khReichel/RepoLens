events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 1. Route API requests
        # This matches anything starting with /api/
        location /api/ {
            # IMPORTANT: If there is a / at the end, “/api/” will be removed.
            # So “/api/v1/analyze” becomes “http://backend:8000/v1/analyze”.
            proxy_pass http://backend:8000/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Route UI requests
        # Everything else goes to the UI container
        location / {
            proxy_pass http://ui:80;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
